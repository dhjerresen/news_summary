<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Summary Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="container">
    <h1>News Summary Dashboard</h1>
    <p class="subtitle">Top clustered news summaries generated by the pipeline</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Latest Run</h2>
      <div id="run-info">Loading run info...</div>
    </section>

    <section class="card">
      <h2>Pipeline Metrics</h2>
      <div id="metrics" class="metrics-grid">Loading metrics...</div>
    </section>

    <section class="card">
      <h2>Top Summaries</h2>
      <div id="summaries">Loading summaries...</div>
    </section>
  </main>

  <script>
    async function loadDashboard() {
      try {
        const response = await fetch("./latest.json");
        if (!response.ok) {
          throw new Error("Could not load latest.json");
        }

        const data = await response.json();
        const metadata = data.metadata || {};
        const summaries = data.summaries || [];

        document.getElementById("run-info").innerHTML = `
          <p><strong>Run ID:</strong> ${data.run_id || "N/A"}</p>
          <p><strong>Status:</strong> ${metadata.status || "N/A"}</p>
          <p><strong>Started:</strong> ${metadata.started_at || "N/A"}</p>
          <p><strong>Finished:</strong> ${metadata.finished_at || "N/A"}</p>
          <p><strong>Model:</strong> ${metadata.model_name || "N/A"}</p>
          <p><strong>Prompt Version:</strong> ${metadata.prompt_version || "N/A"}</p>
        `;

        document.getElementById("metrics").innerHTML = `
          <div class="metric-box">
            <span class="metric-label">Raw Clusters</span>
            <span class="metric-value">${metadata.num_raw_clusters ?? 0}</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Raw Articles</span>
            <span class="metric-value">${metadata.num_raw_articles ?? 0}</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Processed Clusters</span>
            <span class="metric-value">${metadata.num_processed_clusters ?? 0}</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Successful Summaries</span>
            <span class="metric-value">${metadata.num_successful_summaries ?? 0}</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Failed Clusters</span>
            <span class="metric-value">${metadata.num_failed_clusters ?? 0}</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Wiki Misses</span>
            <span class="metric-value">${metadata.wiki_miss_count ?? 0}</span>
          </div>
        `;

        if (summaries.length === 0) {
          document.getElementById("summaries").innerHTML = "<p>No summaries available.</p>";
          return;
        }

        document.getElementById("summaries").innerHTML = summaries.map(item => `
          <article class="article-card">
            <div class="article-header">
              <span class="rank-badge">#${item.cluster_rank ?? "-"}</span>
              <h3>${item.title || "Untitled"}</h3>
            </div>

            <p class="article-meta">
              <strong>Topic:</strong> ${item.topic || "Unknown"} |
              <strong>Source:</strong> ${item.source_name || "Unknown"} |
              <strong>Cluster Size:</strong> ${item.cluster_size ?? 0} |
              <strong>Published:</strong> ${item.published_at || "N/A"}
            </p>

            <p><strong>Summary:</strong> ${item.summary || "No summary available."}</p>

            ${item.enriched_summary ? `
              <details>
                <summary>Show enriched summary</summary>
                <p>${item.enriched_summary}</p>
              </details>
            ` : ""}

            ${item.wiki_context ? `
              <details>
                <summary>Show Wikipedia context</summary>
                <p>${item.wiki_context}</p>
              </details>
            ` : ""}

            ${item.supporting_sources && item.supporting_sources.length ? `
              <p><strong>Supporting Sources:</strong> ${item.supporting_sources.join(", ")}</p>
            ` : ""}

            ${item.url ? `
              <p><a href="${item.url}" target="_blank" rel="noopener noreferrer">Read lead article</a></p>
            ` : ""}

            ${item.supporting_articles && item.supporting_articles.length ? `
              <details>
                <summary>Show supporting articles (${item.supporting_articles.length})</summary>
                <ul class="supporting-list">
                  ${item.supporting_articles.map(article => `
                    <li>
                      <a href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a>
                      <span> — ${article.source_name || "Unknown"} (${article.published_at || "N/A"})</span>
                    </li>
                  `).join("")}
                </ul>
              </details>
            ` : ""}
          </article>
        `).join("");
      } catch (error) {
        document.getElementById("run-info").innerHTML = `<p class="error">${error.message}</p>`;
        document.getElementById("metrics").innerHTML = "";
        document.getElementById("summaries").innerHTML = "<p class='error'>Could not load dashboard data.</p>";
      }
    }

    loadDashboard();
  </script>
</body>
</html>
